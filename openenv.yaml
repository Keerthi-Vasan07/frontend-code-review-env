# openenv.yaml
# OpenEnv environment specification for frontend_code_review_env
# -----------------------------------------------------------------------------

name: frontend_code_review_env
version: "1.0.0"
description: >
  An OpenEnv-compliant environment that evaluates AI-generated frontend code
  (HTML/CSS/JS) using deterministic, rule-based grading.  The environment
  simulates real-world frontend code review tasks at three difficulty levels
  (easy, medium, hard).

author: "OpenEnv Contributor"
license: MIT

# ---------------------------------------------------------------------------
# Environment class
# ---------------------------------------------------------------------------

entry_point: "env:FrontendCodeReviewEnv"

# ---------------------------------------------------------------------------
# Interface
# ---------------------------------------------------------------------------

interface:
  reset:
    description: >
      Starts a new episode.  Selects the next task from the pool
      (round-robin, deterministic) and returns an Observation.
    returns: Observation

  step:
    description: >
      Accepts an Action containing HTML/CSS/JS code and returns
      (Observation, reward, done, info).  One task = one episode;
      done is always True after the first step.
    input: Action
    returns:
      - Observation
      - reward: float          # range [-0.5, 1.0]
      - done: bool             # always True
      - info: dict

  state:
    description: >
      Returns a serialisable snapshot of the current environment state,
      useful for logging and debugging.
    returns: dict

# ---------------------------------------------------------------------------
# Observation schema
# ---------------------------------------------------------------------------

observation:
  type: object
  description: "Observation returned by reset() and step()."
  fields:
    task_description:
      type: string
      description: "Human-readable description of the frontend task."
    requirements:
      type: array
      items: string
      description: "Ordered list of concrete requirements the code must satisfy."
    difficulty:
      type: string
      enum: [easy, medium, hard]
      description: "Difficulty tier of the task."
    step_count:
      type: integer
      minimum: 0
      description: "Number of steps taken so far (0 after reset, 1 after the step)."
    last_reward:
      type: [number, "null"]
      description: "Reward received on the last step, or null before any step."
    done:
      type: boolean
      description: "True once the episode has terminated."

# ---------------------------------------------------------------------------
# Action schema
# ---------------------------------------------------------------------------

action:
  type: object
  description: "Action submitted by the agent."
  fields:
    code:
      type: string
      description: "Raw HTML/CSS/JS source code generated by the agent."

# ---------------------------------------------------------------------------
# Reward
# ---------------------------------------------------------------------------

reward:
  type: float
  range: [-0.5, 1.0]
  description: >
    Partial, deterministic reward computed from rule-based grading.
    Sub-scores are summed and capped at 1.0.  Penalties (up to -0.5)
    are applied for missing, empty, or invalid submissions.

  scoring:
    easy:
      max: 1.0
      breakdown:
        element_present: 0.5
        style_correct: 0.5

    medium:
      max: 1.0
      breakdown:
        correct_structure: 0.4
        required_elements: 0.3
        styling: 0.3

    hard:
      max: 1.0
      breakdown:
        structure: 0.3
        responsiveness: 0.3
        accessibility: 0.2
        code_quality: 0.2

  penalties:
    missing_code: -0.5
    empty_response: -0.5
    invalid_format: -0.5

# ---------------------------------------------------------------------------
# Episode
# ---------------------------------------------------------------------------

episode:
  max_steps: 1
  description: "One task = one episode.  done=True after the single step."

# ---------------------------------------------------------------------------
# Tasks
# ---------------------------------------------------------------------------

tasks:
  total: 15
  difficulty_levels:
    easy:
      count: 5
      task_ids: [easy_01, easy_02, easy_03, easy_04, easy_05]
    medium:
      count: 5
      task_ids: [medium_01, medium_02, medium_03, medium_04, medium_05]
    hard:
      count: 5
      task_ids: [hard_01, hard_02, hard_03, hard_04, hard_05]

# ---------------------------------------------------------------------------
# Dependencies
# ---------------------------------------------------------------------------

dependencies:
  python: ">=3.9"
  packages:
    - pydantic>=2.0
    - openai>=1.0       # required only for baseline.py
    - pyyaml>=6.0

# ---------------------------------------------------------------------------
# Docker
# ---------------------------------------------------------------------------

docker:
  image: frontend-code-review-env
  build_command: "docker build -t frontend-code-review-env ."
  run_command: >
    docker run --rm
      -e OPENAI_API_KEY=$OPENAI_API_KEY
      frontend-code-review-env

# ---------------------------------------------------------------------------
# Metadata
# ---------------------------------------------------------------------------

tags:
  - frontend
  - code-review
  - html
  - css
  - javascript
  - accessibility
  - responsiveness
  - deterministic
  - openenv

changelog:
  "1.0.0":
    - Initial release with 15 tasks (5 easy, 5 medium, 5 hard).
    - Deterministic rule-based grader.
    - OpenAI GPT-4o baseline script.
